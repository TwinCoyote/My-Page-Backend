<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backend • Portafolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #0b0f17;
        --bg-2: #0f172a;
        --neon: #00e6ff;
        --accent: #7c3aed;
        --text: #e5e7eb;
        --muted: #94a3b8;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Ubuntu,
          Cantarell, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji",
          "Segoe UI Emoji";
        color: var(--text);
        background: radial-gradient(
            1200px 800px at 80% -10%,
            rgba(124, 58, 237, 0.18),
            transparent 55%
          ),
          radial-gradient(
            800px 600px at 10% 110%,
            rgba(0, 230, 255, 0.15),
            transparent 60%
          ),
          linear-gradient(180deg, var(--bg-1), var(--bg-2));
        overflow: hidden;
      }
      .grid {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.22;
        mix-blend-mode: overlay;
        background-image: linear-gradient(
            transparent 31px,
            rgba(148, 163, 184, 0.08) 32px
          ),
          linear-gradient(
            90deg,
            transparent 31px,
            rgba(148, 163, 184, 0.08) 32px
          );
        background-size: 32px 32px;
        mask-image: radial-gradient(
          circle at 50% 50%,
          black 55%,
          transparent 75%
        );
        animation: pulse 6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.22;
        }
        50% {
          opacity: 0.36;
        }
      }
      .scan {
        position: fixed;
        left: -20%;
        right: -20%;
        height: 120px;
        top: -120px;
        background: linear-gradient(
          to bottom,
          transparent,
          rgba(0, 230, 255, 0.12),
          transparent
        );
        filter: blur(0.5px);
        animation: scan 8s linear infinite;
      }
      @keyframes scan {
        to {
          transform: translateY(130vh);
        }
      }

      .wrap {
        position: relative;
        display: grid;
        place-items: center;
        height: 100%;
        padding: 24px;
      }
      .card {
        width: min(900px, 92vw);
        background: linear-gradient(
          180deg,
          rgba(13, 19, 33, 0.85),
          rgba(13, 19, 33, 0.72)
        );
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 18px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45),
          inset 0 0 0 1px rgba(124, 58, 237, 0.08);
        backdrop-filter: blur(8px);
        padding: 36px 28px;
        position: relative;
      }
      .halo {
        position: absolute;
        inset: -2px;
        z-index: 0;
        border-radius: 18px;
        background: radial-gradient(
            600px 120px at 50% 10%,
            rgba(124, 58, 237, 0.25),
            transparent 60%
          ),
          radial-gradient(
            800px 220px at 50% 120%,
            rgba(0, 230, 255, 0.2),
            transparent 65%
          );
        filter: blur(18px);
      }
      .content {
        position: relative;
        z-index: 1;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.08em;
        color: var(--muted);
        text-transform: uppercase;
        background: rgba(148, 163, 184, 0.08);
        border: 1px solid rgba(148, 163, 184, 0.18);
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--neon);
        box-shadow: 0 0 18px var(--neon);
      }
      h1 {
        margin: 18px 0 10px;
        font-size: clamp(28px, 4vw, 48px);
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      p.lead {
        margin: 0;
        color: var(--muted);
        font-size: clamp(14px, 1.6vw, 18px);
      }
      .stack {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 22px;
      }
      .chip {
        padding: 8px 12px;
        border-radius: 10px;
        background: rgba(124, 58, 237, 0.14);
        color: #d6bcff;
        border: 1px solid rgba(124, 58, 237, 0.28);
        font-size: 12px;
      }

      .cta-wrap {
        display: grid;
        place-items: center;
        margin: 28px 0 6px;
      }
      .btn {
        --glow: 0 0 14px rgba(0, 230, 255, 0.7),
          0 0 32px rgba(124, 58, 237, 0.5);
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 14px 22px;
        border-radius: 12px;
        text-decoration: none;
        color: #06121a;
        font-weight: 700;
        background: linear-gradient(90deg, var(--neon), #9a6bff);
        box-shadow: var(--glow);
        transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
      }
      .btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
        box-shadow: 0 0 18px rgba(0, 230, 255, 0.9),
          0 0 40px rgba(124, 58, 237, 0.64);
      }
      .btn:active {
        transform: translateY(0);
        filter: brightness(0.98);
      }
      .btn svg {
        filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.25));
      }

      footer {
        margin-top: 22px;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }
      .links {
        display: inline-flex;
        gap: 16px;
        margin-left: 10px;
      }
      .links a {
        color: #9bd8ff;
        text-decoration: none;
      }
      .links a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="grid"></div>
    <div class="scan"></div>
    <main class="wrap">
      <section class="card">
        <div class="halo" aria-hidden="true"></div>
        <div class="content">
          <span class="badge"
            ><span class="dot"></span> Backend de Portafolio</span
          >
          <h1>API de Proyectos lista para el Frontend</h1>
          <p class="lead">
            Gestiona y expone tus proyectos vía Django REST Framework. Este
            panel es el hub técnico del portafolio.
          </p>

          <div class="stack">
            <span class="chip">Django 6</span>
            <span class="chip">DRF</span>
            <span class="chip">CORS</span>
            <span class="chip">PostgreSQL</span>
          </div>

          <div class="cta-wrap">
            <a class="btn" href="/admin/">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <path
                  d="M12 3l4 4-9 9-4 1 1-4 9-9z"
                  stroke="#06121a"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M15 6l3 3"
                  stroke="#06121a"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
              Ir al Admin
            </a>
          </div>

          <footer>
            Endpoints útiles:
            <span class="links">
              <a href="/proyectos/">GET /proyectos/</a>
              <a href="/proyectos/1/">GET /proyectos/&lt;id&gt;/</a>
            </span>
          </footer>
        </div>
      </section>
    </main>
  </body>
</html>
